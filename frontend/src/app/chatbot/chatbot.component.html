<ng-container *ngIf="isAdmin">
  <!-- FAB Trigger Button (always shows chat icon) -->
  <button class="chat-trigger" (click)="toggleChat()" [class.active]="isOpen" title="Hueber Asistan">
    <i class="fas fa-comments"></i>
    <span class="fab-badge" *ngIf="!isOpen && unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <!-- Backdrop -->
  <div class="chat-backdrop" [class.visible]="isOpen" (click)="toggleChat()"></div>

  <!-- Side Drawer -->
  <div class="chat-drawer" [class.open]="isOpen">

    <!-- Header -->
    <div class="chat-header">
      <div class="bot-info">
        <div class="bot-avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div class="bot-details">
          <span class="bot-name">Hueber Asistan</span>
          <span class="bot-status"><span class="status-dot"></span>Çevrimiçi</span>
        </div>
      </div>
      <button class="close-btn" (click)="toggleChat()" title="Kapat">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #scrollMe [scrollTop]="scrollMe.scrollHeight">
      <div *ngFor="let msg of messages" class="message-wrapper" [class.user]="msg.sender === 'user'">
        <div class="message" [class.user]="msg.sender === 'user'" [class.bot]="msg.sender === 'bot'">
          <div [innerHTML]="msg.text | markdown"></div>
          <span class="time">{{ msg.timestamp | date:'HH:mm' }}</span>
        </div>
      </div>
      <div *ngIf="isLoading" class="message-wrapper">
        <div class="message bot loading">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Smart Query Builder -->
    <div class="query-builder">
      <span class="quick-label">Sistem Analizi</span>
      <div class="query-controls">
        <select [(ngModel)]="selectedPeriod" class="query-select">
          <option *ngFor="let p of periods" [value]="p.value">{{ p.label }}</option>
        </select>
        <select [(ngModel)]="selectedDataType" class="query-select">
          <option *ngFor="let t of dataTypes" [value]="t.value">{{ t.label }}</option>
        </select>
        <button class="query-btn" (click)="generateAndSendQuery()" [disabled]="isLoading">
          <i class="fas fa-search-plus"></i> Sorgula
        </button>
      </div>
    </div>


    <!-- Input -->
    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="currentMessage"
        (keyup.enter)="sendMessage()"
        placeholder="Mesajınızı yazın..."
        [disabled]="isLoading"
      >
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="isLoading || !currentMessage.trim()"
      >
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>

  </div>
</ng-container>
