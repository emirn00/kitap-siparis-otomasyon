<mat-card class="logs-card">
  <mat-card-content>
    <div class="logs-header">
      <div class="header-info">
        <h2 class="section-title">Sistem Aktiviteleri</h2>
        <p class="section-description">Sistem üzerinde gerçekleşen tüm önemli olayların kronolojik dökümü.</p>
      </div>
      <button class="refresh-btn" (click)="loadLogs()" [class.spinning]="loading">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <!-- Filters -->
    <div class="logs-filters">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input 
          type="text" 
          [(ngModel)]="searchTerm" 
          (input)="onSearch()" 
          placeholder="Loglarda ara (mesaj, başlık...)"
        >
      </div>

      <div class="filter-group">
        <label>Tür:</label>
        <select [(ngModel)]="typeFilter" (change)="onTypeFilterChange()">
          <option value="all">Tümü</option>
          <option value="ORDER">Siparişler</option>
          <option value="MAIL">E-postalar</option>
          <option value="USER_REGISTRATION">Yeni Kayıtlar</option>
          <option value="SYSTEM">Sistem</option>
        </select>
      </div>
    </div>

    <!-- Timeline Container -->
    <div class="timeline-container" *ngIf="!loading && filteredLogs.length > 0">
      <div class="timeline-item" *ngFor="let log of filteredLogs">
        <div class="timeline-icon" [ngClass]="getBadgeClass(log.type)">
          <i class="fas" [ngClass]="getIconForType(log.type)"></i>
        </div>
        <div class="timeline-content">
          <div class="content-header">
            <span class="log-type-badge" [ngClass]="getBadgeClass(log.type)">
              {{ getTypeLabel(log.type) }}
            </span>
            <span class="log-date">{{ formatDate(log.createdAt) }}</span>
          </div>
          <h3 class="log-title">{{ log.title }}</h3>
          <p class="log-message">{{ log.message }}</p>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loglar yükleniyor...</p>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!loading && filteredLogs.length === 0">
      <div class="empty-icon"><i class="fas fa-history"></i></div>
      <p>Herhangi bir aktivite kaydı bulunamadı.</p>
    </div>
  </mat-card-content>
</mat-card>
