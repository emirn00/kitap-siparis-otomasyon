<mat-card class="form-card">
  <mat-card-content>

    <div *ngIf="successMessage" class="alert alert-success">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <div class="add-book-header">
      <div class="header-icon-box">
        <i class="fas fa-plus-circle"></i>
      </div>
      <div class="header-text">
        <h2 class="modern-title">{{ 'newBook' | translate }}</h2>
        <p class="modern-subtitle">{{ 'newBookDesc' | translate }}</p>
      </div>
    </div>

    <form [formGroup]="addBookForm" (ngSubmit)="onSubmit()" class="modern-form">
      <div class="form-grid">
        <div class="form-group-modern">
          <label class="modern-label"><i class="fas fa-bookmark"></i> {{ 'requestName' | translate }}</label>
          <div class="input-wrapper">
            <input type="text" formControlName="requestName" [placeholder]="'requestName' | translate">
            <div class="error-text" *ngIf="requestName?.invalid && requestName?.touched">
              {{ 'requiredField' | translate }}
            </div>
          </div>
        </div>

        <div class="form-group-modern">
          <label class="modern-label"><i class="fas fa-tags"></i> {{ 'orderName' | translate }}</label>
          <div class="input-wrapper">
            <input type="text" formControlName="orderName" [placeholder]="'orderName' | translate">
            <div class="error-text" *ngIf="orderName?.invalid && orderName?.touched">
              {{ 'requiredField' | translate }}
            </div>
          </div>
        </div>

        <div class="form-group-modern">
          <label class="modern-label"><i class="fas fa-key"></i> {{ 'lisencodeName' | translate }}</label>
          <div class="input-wrapper">
            <input type="text" formControlName="lisencodeName" [placeholder]="'lisencodeName' | translate">
            <div class="error-text" *ngIf="lisencodeName?.invalid && lisencodeName?.touched">
              {{ 'requiredField' | translate }}
            </div>
          </div>
        </div>

        <div class="form-group-modern">
          <label class="modern-label"><i class="fas fa-barcode"></i> {{ 'isbn' | translate }}</label>
          <div class="input-wrapper">
            <input type="text" formControlName="isbn" [placeholder]="'isbn' | translate">
            <div class="error-text" *ngIf="isbn?.invalid && isbn?.touched">
              {{ 'requiredField' | translate }}
            </div>
          </div>
        </div>
      </div>

      <div class="modern-form-actions">
        <button class="modern-submit-btn" type="submit" [disabled]="addBookForm.invalid">
          <i class="fas fa-save"></i> {{ 'addBook' | translate }}
        </button>
        <a class="modern-back-btn" [routerLink]="['/admin/books']">
          <i class="fas fa-arrow-left"></i> {{ 'goToBooks' | translate }}
        </a>
      </div>
    </form>

  </mat-card-content>
</mat-card>
